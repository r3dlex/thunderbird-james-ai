name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: cd tools/pipeline_runner && poetry install --no-interaction

      - name: Run lint pipeline
        run: cd tools/pipeline_runner && poetry run pipeline-runner lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: cd tools/pipeline_runner && poetry install --no-interaction

      - name: Run test pipeline
        run: cd tools/pipeline_runner && poetry run pipeline-runner test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/
            tools/pipeline_runner/htmlcov/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python dependencies
        run: cd tools/pipeline_runner && poetry install --no-interaction

      - name: Run build pipeline
        run: cd tools/pipeline_runner && poetry run pipeline-runner build

      - name: Run package pipeline
        run: cd tools/pipeline_runner && poetry run pipeline-runner package

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: corvus-xpi
          path: corvus.xpi
